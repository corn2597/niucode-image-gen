name: Packaged native E2E

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  packaged-e2e:
    name: ${{ matrix.id }} packaged generate and edit
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: windows-x64
            runner: windows-latest
            archive_id: win-x64
            package_dir: niucodes-image-gen-win-x64
            build_script: build:package:win-x64
          - id: macos-arm64
            runner: macos-14
            archive_id: macos-arm64
            package_dir: niucodes-image-gen-macos-arm64
            build_script: build:package:macos-arm64
          - id: macos-x64
            runner: macos-13
            archive_id: macos-x64
            package_dir: niucodes-image-gen-macos-x64
            build_script: build:package:macos-x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run ${{ matrix.build_script }}
      - name: Unpack and test the platform release ZIP
        shell: pwsh
        run: |
          $version = (node -p "require('./package.json').version")
          $archive = "release/niucodes-image-gen-${{ matrix.archive_id }}-v$version.zip"
          $destination = Join-Path $env:RUNNER_TEMP "niucodes-image-gen packaged E2E"
          Expand-Archive -LiteralPath $archive -DestinationPath $destination -Force
          node scripts/tests/packaged-e2e.mjs --package-root (Join-Path $destination "${{ matrix.package_dir }}")
