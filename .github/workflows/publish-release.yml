name: Publish release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing Git tag to receive the release assets
        required: true
        default: v1.3.0
        type: string

permissions:
  contents: write

jobs:
  packaged-e2e:
    name: ${{ matrix.id }} release package verification
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: windows-x64
            runner: windows-latest
            package_dir: niucodes-image-gen-win-x64
          - id: macos-arm64
            runner: macos-14
            package_dir: niucodes-image-gen-macos-arm64
          - id: macos-x64
            runner: macos-13
            package_dir: niucodes-image-gen-macos-x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build:release
      - name: Unpack and test the platform release ZIP
        shell: pwsh
        run: |
          $version = (node -p "require('./package.json').version")
          $archive = "release/niucodes-image-gen-${{ matrix.id }}-v$version.zip"
          $destination = Join-Path $env:RUNNER_TEMP "niucodes-image-gen release verification"
          Expand-Archive -LiteralPath $archive -DestinationPath $destination -Force
          node scripts/tests/packaged-e2e.mjs --package-root (Join-Path $destination "${{ matrix.package_dir }}")

  publish:
    needs: packaged-e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build:release

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ inputs.tag }}"
          version="${version#v}"
          gh release upload "${{ inputs.tag }}" \
            "release/niucodes-image-gen-v${version}.zip" \
            "release/niucodes-image-gen-macos-arm64-v${version}.zip" \
            "release/niucodes-image-gen-macos-x64-v${version}.zip" \
            "release/niucodes-image-gen-win-x64-v${version}.zip" \
            release/SHA256SUMS.txt \
            --clobber
