name: Windows runner test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  runner-contract:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:windows-runner
